<!doctype html>
<html>
  <head>
    <title>Update Student</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <h2>Update Student</h2>
      <hr />

      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="mb-3">
          <label>Name</label>
          <input
            type="text"
            name="name"
            class="form-control"
            value="{{ student.name }}"
            required
          />
        </div>

        <div class="mb-3">
          <label>Age</label>
          <input
            type="number"
            name="age"
            class="form-control"
            value="{{ student.age }}"
            required
          />
        </div>

        <div class="mb-3">
          <label>Gender</label>
          <select name="gender" class="form-control" required>
            <option value="">Select Gender</option>
            <option value="Male" {% if student.gender == "Male" %}selected{% endif %}>Male</option>
            <option value="Female" {% if student.gender == "Female" %}selected{% endif %}>Female</option>
            <option value="Other" {% if student.gender == "Other" %}selected{% endif %}>Other</option>
          </select>
        </div>

        <div class="mb-3">
          <label>Email</label>
          <input
            type="email"
            name="email"
            class="form-control"
            value="{{ student.email }}"
            required
          />
        </div>

        <div class="mb-3">
          <label>Address</label>
          <textarea
            name="address"
            class="form-control"
            rows="3"
            required
          >{{ student.address }}</textarea>
        </div>

        <div class="mb-3">
          <label>Course</label>
          <select name="course" class="form-control" required>
            <option value="">Select Course</option>
            <option value="Python Full Stack" {% if student.course == "Python Full Stack" %}selected{% endif %}>Python Full Stack</option>
            <option value="Java Full Stack" {% if student.course == "Java Full Stack" %}selected{% endif %}>Java Full Stack</option>
            <option value="Web Development" {% if student.course == "Web Development" %}selected{% endif %}>Web Development</option>
            <option value="Frontend Development" {% if student.course == "Frontend Development" %}selected{% endif %}>Frontend Development</option>
            <option value="Backend Development" {% if student.course == "Backend Development" %}selected{% endif %}>Backend Development</option>
            <option value="Data Science" {% if student.course == "Data Science" %}selected{% endif %}>Data Science</option>
            <option value="Artificial Intelligence" {% if student.course == "Artificial Intelligence" %}selected{% endif %}>Artificial Intelligence</option>
            <option value="Machine Learning" {% if student.course == "Machine Learning" %}selected{% endif %}>Machine Learning</option>
            <option value="Cyber Security" {% if student.course == "Cyber Security" %}selected{% endif %}>Cyber Security</option>
            <option value="Cloud Computing" {% if student.course == "Cloud Computing" %}selected{% endif %}>Cloud Computing</option>
            <option value="DevOps" {% if student.course == "DevOps" %}selected{% endif %}>DevOps</option>
            <option value="UI/UX Design" {% if student.course == "UI/UX Design" %}selected{% endif %}>UI/UX Design</option>
          </select>
        </div>


        <div class="mb-3">
          <label>Current Image</label><br />
          <img
            src="{{ student.image.url }}"
            width="100"
            style="border-radius: 10px"
          /><br /><br />
          <label for="image">Change Image</label>
          <input
            type="file"
            name="image"
            class="form-control"
            accept="image/*"
          />
        </div>

        <button type="submit" class="btn btn-primary">Update</button>
        <a href="{% url 'student_list' %}" class="btn btn-secondary">Cancel</a>
      </form>
    </div>
  </body>
</html>
