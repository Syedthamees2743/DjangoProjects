<!DOCTYPE html>
<html>
<head>
    <title>Student Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2>Student Details</h2>
        <hr>

        <div class="card" style="width: 400px;">
            <img src="{{ student.image.url }}" class="card-img-top" style="height:250px; object-fit:cover;">
            
            <div class="card-body">
                <h5 class="card-title">{{ student.name }}</h5>
                <p class="card-text"><strong>Age:</strong> {{ student.age }}</p>
                <p class="card-text"><strong>Gender:</strong> {{ student.gender }}</p>
                <p class="card-text"><strong>Email:</strong> {{ student.email }}</p>
                <p class="card-text"><strong>Address:</strong> {{ student.address }}</p>
                <p class="card-text"><strong>Course:</strong> {{ student.course }}</p>
                
                <a href="{% url 'update_student' student.id %}" class="btn btn-warning">Edit</a>
                <a href="{% url 'student_list' %}" class="btn btn-secondary">Back to List</a>
            </div>
        </div>
    </div>
</body>
</html>
