{% extends 'base.html' %}
{% block title %}Forgot Password - TrainBook{% endblock %}
{% block content %}
<div class="page-header">
    <div class="container">
        <h1>Forgot Password</h1>
        <p>Reset your password</p>
        <div class="page-header-divider"></div>
    </div>
</div>
<div class="container mb-5">
    <div class="row">
        <div class="col-lg-5 mx-auto">
            <div class="form-card form-card-warning">
                <div class="card-header">Enter Your Email</div>
                <div class="card-body">
                    <p style="font-size:14px; color:#666; margin-bottom:20px;">Enter the email address associated with your account.</p>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3"><label class="form-label">Email</label>{{ form.email }}</div>
                        <button type="submit" class="btn btn-warning w-100">Submit</button>
                    </form>
                    <p class="text-center mt-3" style="font-size:14px;"><a href="{% url 'login' %}" style="color:#1a237e; font-weight:600;">Back to Login</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
