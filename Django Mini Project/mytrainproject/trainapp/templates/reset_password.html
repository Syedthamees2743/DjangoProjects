{% extends 'base.html' %}
{% block title %}Reset Password - TrainBook{% endblock %}
{% block content %}
<div class="page-header">
    <div class="container">
        <h1>Reset Password</h1>
        <p>Set a new password</p>
        <div class="page-header-divider"></div>
    </div>
</div>
<div class="container mb-5">
    <div class="row">
        <div class="col-lg-5 mx-auto">
            <div class="form-card form-card-info">
                <div class="card-header">Create New Password</div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3"><label class="form-label">New Password</label>{{ form.new_password }}</div>
                        <div class="mb-3"><label class="form-label">Confirm New Password</label>{{ form.confirm_password }}</div>
                        <button type="submit" class="btn btn-info w-100">Reset Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
