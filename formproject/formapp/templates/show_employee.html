<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Show Details</h2>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Department</th>
            <th>Action</th>
           
        </tr>
        {% for i in display %}
        <tr>
            <td>{{i.empid}}</td>
            <td>{{i.emp_name}}</td>
            <td>{{i.emp_department}}</td>
            <td>
                <a href="{% url 'edit_employee' i.id %}">Edit</a>
                <a href="">Delete</a>
            </td>

        </tr>
        {% endfor %}
</body>
</html>
