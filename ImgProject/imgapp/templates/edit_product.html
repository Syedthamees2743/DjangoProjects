<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product</title>
</head>
<body>
    <h1>Edit Product</h1>

    <form action="{% url 'edit_product' product.id %}" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="text" name="prodname" value="{{ product.prodname }}" placeholder="Enter Product Name"><br><br>
        <input type="text" name="proddes" value="{{ product.proddes }}" placeholder="Enter Product Description"><br><br>
        <input type="text" name="prodprc" value="{{ product.prodprc }}" placeholder="Enter Product Price"><br><br>
        <p>Current image:</p>
        {% if product.image %}
            <img src="{{ product.image.url }}" alt="{{ product.prodname }}" width="100"><br><br>
        {% endif %}
        <input type="file" name="image" accept="image/*"><br><br>
        <button type="submit">Save Changes</button>
    </form>

    <p><a href="{% url 'show_product' %}">Back to products</a></p>
</body>
</html>
