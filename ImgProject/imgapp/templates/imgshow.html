<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Add Product</h1>

    <form action="{% url 'add_product' %}" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="text" name="prodname" placeholder="Enter Product Name"><br><br>
        <input type="text" name="proddes" placeholder="Enter Product Description"><br><br>
        <input type="text" name="prodprc" placeholder="Enter Product Price"><br><br>
        <input type="file" name="image" accept="image/*"><br><br>
        <input type="submit" value="Add Product">
    </form>
</body>
</html>
