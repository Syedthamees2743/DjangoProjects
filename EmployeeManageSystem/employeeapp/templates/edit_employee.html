<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Employee</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>
  <body>
    <div class="container">
      <h2>Update Employee</h2>

      <form action="/updateemployee/{{ edemp.id }}/" method="POST">
        {% csrf_token %}

        <div class="form-group">
          <label>Employee Name</label>
          <input type="text" name="name" value="{{ edemp.name }}" required />
        </div>

        <div class="form-group">
          <label>📧 Email Address</label>
          <input type="email" name="email" value="{{ edemp.email }}" required />
        </div>

        <div class="form-group">
          <label>Department</label>
          <input
            type="text"
            name="department"
            value="{{ edemp.department }}"
            required
          />
        </div>

        <div class="form-group">
          <label>💰 Salary</label>
          <input
            type="number"
            name="salary"
            value="{{ edemp.salary }}"
            required
          />
        </div>

        <button class="btn" type="submit">Update Employee</button>
      </form>

      <a href="/view/" class="link-btn"> Back to Employee List </a>
    </div>
  </body>
</html>
