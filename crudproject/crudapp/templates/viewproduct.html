<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>View Product Details</h1>
    {% csrf_token %}
    <table>
        <tr>
            <th>Product ID</th>
            <th>Name</th>
            <th>Quantity</th>
            <th>Description</th>
            <th>Price</th>
            <th>Action</th>
        </tr>

        {% for i in pro %}
        <tr>
            <td>{{i.id}}</td>
            <td>{{i.prodname}}</td>
            <td>{{i.quantity}}</td>
            <td>{{i.description}}</td>
            <td>{{i.price}}</td>
            <td><a href="{% url 'editproduct' i.id %}">Edit Products</a></td>
            <td><a href="{% url 'deleteproduct' i.id %}">Delete</a></td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
