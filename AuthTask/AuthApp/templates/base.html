<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AuthTask{% endblock %}</title>
    <style>
        :root {
            --bg: #f7f9ff;
            --surface: #ffffff;
            --surface-strong: #fbfdff;
            --text: #142136;
            --text-muted: #52607a;
            --border: rgba(74, 93, 129, 0.14);
            --primary: #4b6bfe;
            --primary-soft: rgba(75, 107, 254, 0.12);
            --success: #2bc3a5;
            --shadow: 0 24px 64px rgba(11, 31, 73, 0.10);
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top left, rgba(75, 107, 254, 0.12), transparent 28%),
                        linear-gradient(180deg, #eef3ff 0%, #f8fbff 100%);
            color: var(--text);
            min-height: 100vh;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 1rem 1.5rem;
            background: rgba(18, 35, 68, 0.94);
            backdrop-filter: blur(16px);
            box-shadow: 0 24px 60px rgba(11, 31, 73, 0.16);
        }

        .nav-brand {
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 0.04em;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .nav-links a:hover,
        .nav-links a:focus {
            color: #ffffff;
        }

        .page-shell {
            width: min(1120px, calc(100% - 2rem));
            margin: 2.5rem auto 3rem;
            padding: 0;
        }

        .message {
            margin-bottom: 1rem;
            padding: 0.95rem 1rem;
            border-radius: 0.95rem;
            font-weight: 600;
            box-shadow: 0 14px 28px rgba(11, 31, 73, 0.08);
        }

        .message.success {
            background: rgba(43, 195, 165, 0.16);
            color: #0d6b57;
        }

        .message.error {
            background: rgba(220, 53, 69, 0.12);
            color: #a61e2d;
        }

        .message.info {
            background: rgba(75, 107, 254, 0.12);
            color: #3147a8;
        }

        .panel {
            display: grid;
            gap: 1.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            box-shadow: var(--shadow);
            padding: 2rem;
        }

        .page-heading {
            margin: 0 0 1rem;
            font-size: clamp(2rem, 3vw, 2.8rem);
            line-height: 1.05;
            letter-spacing: -0.03em;
        }

        .subtext {
            margin: 0 0 1.75rem;
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.8;
        }

        .content-grid {
            display: grid;
            gap: 1.5rem;
        }

        .card {
            background: var(--surface-strong);
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            padding: 2rem;
            box-shadow: 0 22px 46px rgba(18, 35, 68, 0.08);
        }

        .card-title {
            margin: 0 0 1rem;
            font-size: 1.75rem;
            color: var(--text);
            font-weight: 700;
        }

        .form-group {
            display: grid;
            gap: 0.65rem;
            margin-bottom: 1.3rem;
        }

        label {
            font-size: 0.95rem;
            font-weight: 700;
            color: #354052;
        }

        .input-field {
            width: 100%;
            min-height: 3.2rem;
            padding: 0.95rem 1rem;
            border-radius: 0.95rem;
            border: 1px solid rgba(74, 93, 129, 0.16);
            background: #f7f9ff;
            color: #192a3b;
            font-size: 1rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 6px rgba(75, 107, 254, 0.12);
            outline: none;
            transform: translateY(-1px);
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.9rem;
            align-items: center;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 3.4rem;
            padding: 0 1.4rem;
            border-radius: 0.95rem;
            border: none;
            cursor: pointer;
            font-size: 0.98rem;
            font-weight: 700;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 36px rgba(75, 107, 254, 0.16);
        }

        .button-primary {
            background: var(--primary);
            color: #ffffff;
        }

        .button-secondary {
            background: var(--success);
            color: #ffffff;
        }

        .button-ghost {
            background: transparent;
            color: #364156;
            border: 1px solid rgba(54, 65, 86, 0.18);
        }

        .text-center {
            text-align: center;
        }

        .text-muted {
            color: var(--text-muted);
        }

        .list-clean {
            margin: 0;
            padding-left: 1.25rem;
            color: #4e5f7a;
        }

        .list-clean li {
            margin-bottom: 0.75rem;
        }

        .link-inline {
            color: var(--primary);
            text-decoration: none;
        }

        .link-inline:hover {
            text-decoration: underline;
        }

        @media (max-width: 820px) {
            .topbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .button-row {
                width: 100%;
            }

            .page-shell {
                margin: 1.5rem auto;
            }
        }
    </style>
</head>
<body>
    <nav class="topbar">
        <a class="nav-brand" href="{% url 'home' %}">AuthTask</a>
        <ul class="nav-links">
            <li><a href="{% url 'home' %}">Home</a></li>
            <li><a href="{% url 'login_view' %}">Login</a></li>
            <li><a href="{% url 'signup_view' %}">Signup</a></li>
            <li><a href="{% url 'about' %}">About</a></li>
        </ul>
    </nav>

    <main class="page-shell">
        {% if messages %}
            {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
