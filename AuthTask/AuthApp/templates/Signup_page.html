{% extends 'base.html' %}
{% block title %}Signup - AuthTask{% endblock %}

{% block content %}
<section class="card">
    <div>
        <h2 class="card-title">Signup</h2>
        <p class="subtext">Create a secure account to access the AuthTask dashboard.</p>
    </div>
    <form method="post" action="{% url 'usercreate' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="firstname">First Name</label>
            <input type="text" class="input-field" id="firstname" name="firstname" placeholder="Enter your First Name">
        </div>
        <div class="form-group">
            <label for="lastname">Last Name</label>
            <input type="text" class="input-field" id="lastname" name="lastname" placeholder="Enter your Last Name">
        </div>
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" class="input-field" id="username" name="username" placeholder="Choose a username">
        </div>
        <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" class="input-field" id="email" name="email" placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label for="password1">Password</label>
            <input type="password" class="input-field" id="password1" name="password1" placeholder="Enter password">
        </div>
        <div class="form-group">
            <label for="password2">Confirm Password</label>
            <input type="password" class="input-field" id="password2" name="password2" placeholder="Confirm password">
        </div>
        <div class="button-row">
            <button type="submit" class="button button-secondary">Sign Up</button>
            <a href="{% url 'login' %}" class="button button-ghost">Already have an account?</a>
        </div>
    </form>
</section>
{% endblock %}
