{% extends 'keyapp/base.html' %} {% block content %}

<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card">
      <div class="card-header text-center">
        <h2>Add Course Details</h2>
      </div>

      <div class="card-body">
        <form method="POST">
          {% csrf_token %} {{form.course_name}}

          <br />

          {{form.course_fees}}

          <br />

          <button class="btn btn-success w-100">Submit</button>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
