<!doctype html>
<html>
  <head>
    <title>Step 2 - Second Number</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #e0eafc, #cfdef3);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
      }
      .card {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        width: 350px;
        text-align: center;
        animation: slideUp 0.5s ease-out;
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      h2 {
        color: #2c3e50;
        margin-top: 0;
      }
      hr {
        border: 1px solid #eee;
        margin-bottom: 25px;
      }
      input[type="text"] {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 2px solid #ddd;
        border-radius: 10px;
        font-size: 18px;
        box-sizing: border-box;
        transition:
          border-color 0.3s,
          box-shadow 0.3s;
      }
      input[type="text"]:focus {
        border-color: #3498db;
        box-shadow: 0 0 10px rgba(52, 152, 219, 0.3);
        outline: none;
      }
      label {
        font-weight: bold;
        color: #555;
        display: block;
        text-align: left;
      }
      .errorlist {
        color: #e74c3c;
        font-size: 14px;
        text-align: left;
        list-style: none;
        padding: 0;
        margin: 5px 0;
      }

      .saved-data {
        background: #e8f8f5;
        color: #16a085;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-weight: bold;
      }

      .btn-group {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }
      .btn-back {
        background: #eee;
        color: #555;
        border: none;
        padding: 12px 20px;
        border-radius: 10px;
        font-size: 18px;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.2s;
      }
      .btn-back:hover {
        background: #ddd;
      }
      .btn {
        background: #3498db;
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 10px;
        font-size: 18px;
        cursor: pointer;
        flex-grow: 1;
        transition:
          transform 0.2s,
          box-shadow 0.2s,
          background 0.2s;
      }
      .btn:hover {
        background: #2980b9;
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
      }
      .btn:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Step 2 of 4</h2>
      <hr />
      <div class="saved-data">First Number: {{ first_number }}</div>
      <form method="post">
        {% csrf_token %} {{ form.as_p }}
        <div class="btn-group">
          <a href="{% url 'step1' %}" class="btn-back">&larr; Back</a>
          <button type="submit" class="btn">Next &rarr;</button>
        </div>
      </form>
    </div>
  </body>
</html>
