<!doctype html>
<html>
  <head>
    <title>Result</title>
    <style>
      /* --- Base Setup --- */
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #e0eafc, #cfdef3);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
      }

      /* --- Card & Slide Animation --- */
      .card {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        width: 380px; /* Slightly wider for the result */
        text-align: center;
        animation: slideUp 0.5s ease-out;
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h2 {
        color: #2c3e50;
        margin-top: 0;
        font-size: 24px;
      }
      hr {
        border: 1px solid #eee;
        margin-bottom: 25px;
      }

      /* --- Summary Box --- */
      .summary {
        background: #f8f9fa;
        border: 1px solid #e9ecef;
        border-radius: 12px;
        padding: 15px 20px;
        margin-bottom: 25px;
        text-align: left;
      }
      .summary p {
        margin: 8px 0;
        font-size: 16px;
        color: #7f8c8d;
      }
      .summary strong {
        color: #2c3e50;
        float: right;
      }

      /* --- Success Result Box --- */
      .result-box {
        background: linear-gradient(135deg, #3498db, #2ecc71);
        color: white;
        padding: 25px;
        border-radius: 15px;
        margin: 0 0 25px 0; /* Added bottom margin */
        animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      @keyframes popIn {
        from {
          transform: scale(0.5);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .result-text {
        font-size: 20px;
        margin-bottom: 5px;
        opacity: 0.9;
      }
      .result-number {
        font-size: 48px;
        font-weight: 800;
        letter-spacing: 1px;
      }

      /* --- Error Box --- */
      .error-box {
        background: #fff5f5;
        color: #c0392b;
        border: 2px solid #e74c3c;
        padding: 20px;
        border-radius: 15px;
        margin: 0 0 25px 0;
        font-weight: bold;
        animation: shake 0.5s;
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-10px);
        }
        75% {
          transform: translateX(10px);
        }
      }

      /* --- Calculate Again Button --- */
      .btn-again {
        background: #2ecc71;
        color: white;
        border: none;
        padding: 15px 25px;
        border-radius: 12px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
        display: block; /* Fixes the <a> tag layout */
        text-decoration: none;
        box-sizing: border-box; /* Ensures padding doesn't break width */
        transition:
          transform 0.2s,
          box-shadow 0.2s,
          background 0.2s;
      }
      .btn-again:hover {
        background: #27ae60;
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
      }
      .btn-again:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Result</h2>
      <hr />

      <!-- Clean summary of inputs -->
      <div class="summary">
        <p>First Number <strong>{{ first_number }}</strong></p>
        <p>Operator <strong>{{ operator }}</strong></p>
        <p>Second Number <strong>{{ second_number }}</strong></p>
      </div>

      {% if error %}
      <div class="error-box">&#9888; {{ error }}</div>
      {% else %}
      <div class="result-box">
        <div class="result-text">
          {{ first_number }} {{ operator }} {{ second_number }} =
        </div>
        <div class="result-number">{{ result }}</div>
      </div>
      {% endif %}

      <a href="{% url 'reset' %}" class="btn-again">&#x21bb; Calculate Again</a>
    </div>
  </body>
</html>
