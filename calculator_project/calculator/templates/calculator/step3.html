<!DOCTYPE html>
<html>
<head>
    <title>Step 3 - Select Operator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0;
        }
        .card {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 350px; text-align: center;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        h2 { color: #2c3e50; margin-top: 0; }
        hr { border: 1px solid #eee; margin-bottom: 25px; }
        
        .saved-data { display: flex; gap: 10px; margin-bottom: 20px; }
        .saved-box { flex: 1; background: #e8f8f5; color: #16a085; padding: 10px; border-radius: 8px; font-weight: bold; }

        /* Custom Radio Buttons as Cards */
        .radio-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px;}
        .radio-card {
            background: #f8f9fa; border: 2px solid #dee2e6; border-radius: 10px;
            padding: 15px 20px; cursor: pointer; transition: 0.3s; width: 100px;
        }
        .radio-card:hover { border-color: #3498db; background: #ebf5fb; }
        .radio-card.selected { border-color: #3498db; background: #d6eaf8; transform: scale(1.05); box-shadow: 0 4px 10px rgba(52,152,219,0.2); }
        
        /* Hide the default ugly radio circle */
        input[type="radio"] { display: none; }
        .symbol { font-size: 24px; font-weight: bold; color: #2c3e50; display: block; }
        .text { font-size: 12px; color: #7f8c8d; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-back { background: #eee; color: #555; border: none; padding: 12px 20px; border-radius: 10px; font-size: 18px; cursor: pointer; text-decoration: none; transition: background 0.2s; }
        .btn-back:hover { background: #ddd; }
        .btn { background: #3498db; color: white; border: none; padding: 12px 25px; border-radius: 10px; font-size: 18px; cursor: pointer; flex-grow: 1; transition: transform 0.2s, box-shadow 0.2s; }
        .btn:hover { background: #2980b9; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(52,152,219,0.4); }
        .btn:active { transform: translateY(1px); }
        .errorlist { color: #e74c3c; font-size: 14px; text-align: left; list-style: none; padding: 0; margin: 5px 0; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Step 3 of 4</h2>
        <hr>
        <div class="saved-data">
            <div class="saved-box">1st: {{ first_number }}</div>
            <div class="saved-box">2nd: {{ second_number }}</div>
        </div>

        <form method="post" id="operatorForm">
            {% csrf_token %}
            
            <div class="radio-group">
                {% for choice in form.operator %}
                <label class="radio-card" onclick="selectCard(this)">
                    {{ choice.tag }}
                    <span class="symbol">
                        {% if choice.data.value == "add" %}+
                        {% elif choice.data.value == "subtract" %}-
                        {% elif choice.data.value == "multiply" %}&times;
                        {% elif choice.data.value == "divide" %}&divide;
                        {% endif %}
                    </span>
                    <span class="text">{{ choice.choice_label }}</span>
                </label>
                {% endfor %}
            </div>
            
            {% if form.operator.errors %}
                <ul class="errorlist">
                    {% for error in form.operator.errors %}<li>{{ error }}</li>{% endfor %}
                </ul>
            {% endif %}

            <div class="btn-group">
                <a href="{% url 'step2' %}" class="btn-back">&larr; Back</a>
                <button type="submit" class="btn">Calculate</button>
            </div>
        </form>
    </div>

    <script>
        function selectCard(card) {
            document.querySelectorAll('.radio-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
        }
    </script>
</body>
</html>
